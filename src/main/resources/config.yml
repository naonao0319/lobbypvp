# ============================================
#         PvPAreaPlugin Configuration
#   Messages accept legacy color codes (e.g. &c,
#   &l) as well as MiniMessage tags (<red>, <bold>).
# ============================================

# Storage backend for player stats.
# Options:
#   sqlite - recommended for servers with many players (default)
#   yaml   - plain file, fine for small servers
storage:
  type: sqlite
  # How often (in ticks) to flush dirty stats to storage.
  # 20 ticks = 1 second. Default: 6000 ticks (5 minutes).
  save-interval-ticks: 6000

# Effects played when a player is killed inside a PvP area.
kill-effects:
  sound:
    enabled: true
    name: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.2
  particles:
    enabled: true
    type: CRIT
    count: 12
    offset-x: 0.3
    offset-y: 0.6
    offset-z: 0.3
    speed: 0.05

# Action bar shown while inside a PvP area.
# Placeholders: {kills} {deaths} {kd} {ping}
actionbar:
  enabled: true
  interval-ticks: 20
  format: "&6PvP Area &8| &7Kills: &c{kills} &8| &7Deaths: &c{deaths} &8| &7K/D: &c{kd} &8| &7Ping: &a{ping}ms"

# Kill top list (used by /killtop and holograms).
# Hologram / line placeholders: {rank} {name} {kills}
killtop:
  limit: 10
  hologram-refresh-ticks: 100
  header: "&7--- &6&lKill Top&7 ---"
  empty: "&7No data yet."
  line: "&e#{rank} &f{name} &8- &c{kills} Kills"

# Chat / command messages. Supports &-color codes.
messages:
  no-permission: "&cYou don't have permission to do this."
  player-only: "&cOnly players can use this command."
  unknown-subcommand: "&cUnknown sub-command."
  usage-root: "&cUsage: /pvparea <create|remove|hologram|reload>"
  usage-create: "&cUsage: /pvparea create <name>"
  usage-remove: "&cUsage: /pvparea remove <name>"
  usage-hologram: "&cUsage: /pvparea hologram <create|remove> <name>"
  pos1-set: "&aPosition 1 set to: &f{x}, {y}, {z}"
  pos2-set: "&aPosition 2 set to: &f{x}, {y}, {z}"
  need-selection: "&cYou must select two positions with a Golden Axe first."
  area-created: "&aPvP Area '&f{name}&a' created successfully!"
  area-not-same-world: "&cPositions are not in the same world."
  area-removed: "&aPvP Area '&f{name}&a' removed. Hologram and stats cleared."
  area-not-found: "&cArea not found."
  hologram-created: "&aHologram '&f{name}&a' created at your location."
  hologram-removed: "&aHologram removed."
  hologram-not-found: "&cHologram not found."
  config-reloaded: "&aPvPAreaPlugin config reloaded."

# DO NOT EDIT BELOW — managed by the plugin.
areas: {}
holograms: {}
